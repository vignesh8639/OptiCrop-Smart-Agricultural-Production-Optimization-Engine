<!DOCTYPE html>
<html>
<head>
    <title>Login - Smart Agriculture</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
        }

        .login-box{
            width:450px;
            margin:80px auto;
            background:white;
            padding:35px;
            border-radius:10px;
            box-shadow:0px 0px 15px rgba(0,0,0,.2);
        }

        h2{
            text-align:center;
            color:green;
            margin-bottom:25px;
        }

        button{
            width:100%;
        }
    </style>

</head>
<body>

<div class="login-box">

<h2>🌱 Login</h2>

<form method="POST">

<div class="mb-3">
<label>Email</label>

<input
type="email"
name="email"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Password</label>

<input
type="password"
name="password"
class="form-control"
required>

</div>

<button class="btn btn-success">
Login
</button>

</form>

<hr>

<p class="text-center">

Don't have an account?

<a href="/register">
Register
</a>

</p>

</div>

</body>
</html>
