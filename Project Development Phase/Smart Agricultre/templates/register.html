<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Smart Agriculture</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f7fa;
        }

        .register-card{
            max-width:500px;
            margin:60px auto;
            padding:30px;
            border-radius:15px;
            box-shadow:0px 10px 25px rgba(0,0,0,.15);
            background:white;
        }

        h2{
            text-align:center;
            color:#198754;
            margin-bottom:25px;
        }

        .btn-success{
            width:100%;
        }
    </style>

</head>

<body>

<div class="container">

    <div class="register-card">

        <h2>🌱 Create Account</h2>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category,message in messages %}

                    <div class="alert alert-{{category}}">
                        {{message}}
                    </div>

                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Full Name</label>

                <input type="text"
                       class="form-control"
                       name="fullname"
                       placeholder="Enter your full name"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>

                <input type="email"
                       class="form-control"
                       name="email"
                       placeholder="Enter your email"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>

                <input type="password"
                       class="form-control"
                       name="password"
                       placeholder="Enter password"
                       required>
            </div>

            <button class="btn btn-success">
                Register
            </button>

        </form>

        <hr>

        <p class="text-center">

            Already have an account?

            <a href="/login">
                Login
            </a>

        </p>

        <p class="text-center">

            <a href="/">
                ← Back to Home
            </a>

        </p>

    </div>

</div>

</body>
</html>
